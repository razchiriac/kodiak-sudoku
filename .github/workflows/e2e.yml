name: e2e

# RAZ-73 Phase 3 — Playwright e2e against Vercel preview deploys.
#
# Trigger model
# -------------
# We listen for `deployment_status` rather than `pull_request`. The
# upside: GitHub fires this event the moment Vercel reports the
# preview as "success", so we don't need a separate "wait for the
# preview URL" step (and we don't have to keep a token to talk to
# the Vercel API). The downside: this only fires for branches that
# Vercel actually deploys, but that's already the contract for this
# project — every PR gets a preview, every push to `main` gets a
# production deploy.
#
# Only run for previews. Production deploys go through their own
# smoke checks and we don't want to drive a real user account
# against the live DB. The `environment` filter below is the gate.
#
# Auth fixture
# ------------
# The authed Playwright projects need a real Supabase session. We
# obtain one via the dev/preview-only `/api/test/login` route, which
# requires:
#   1. ENABLE_TEST_LOGIN=1 set in the Vercel *Preview* environment
#      (Project Settings → Environment Variables → Preview only).
#   2. The same flag set on the GitHub runner so playwright.config.ts
#      registers the authed projects.
# If (1) is missing the runner-side authed projects will hit a 404
# from the test-login route and the suite will fail loudly — no
# silent skip.
#
# Why a single fixed test user
# ----------------------------
# Per the Phase 3 decision: we share the dev Supabase project for
# now. The fixed user `e2e+playwright@example.test` is provisioned
# on first call (Supabase auto-creates the row). Tests that mutate
# user-owned tables (saved_games, completed_games) leave residue
# under that account; we accept that for v1 because the data is
# scoped to one user and never surfaces to humans.

on:
  deployment_status:

jobs:
  e2e:
    # Only run when Vercel says the deployment is healthy AND it's
    # a preview (not production). The environment label Vercel sets
    # is typically "Preview" or "Preview – <project>".
    if: |
      github.event.deployment_status.state == 'success'
      && !contains(github.event.deployment_status.environment, 'Production')

    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout the deployed ref
        uses: actions/checkout@v4
        with:
          # Important: check out the SHA Vercel actually deployed,
          # not the workflow's default branch. Otherwise the spec
          # files we run can drift from what's actually live on
          # the preview URL.
          ref: ${{ github.event.deployment_status.deployment.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Install only chromium — that's the only browser our config
      # uses today (see playwright.config.ts). Skipping firefox /
      # webkit shaves ~1.5min off the cold cache.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: npm run test:e2e
        env:
          # Drive every test against the Vercel preview URL.
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
          # Tell playwright.config.ts to register the authed projects.
          # The test-login route on the preview deploy must ALSO have
          # this enabled (set in Vercel Preview env). If it isn't,
          # the auth.setup.ts step fails fast with a clear error.
          ENABLE_TEST_LOGIN: "1"
          CI: "1"

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test-results (traces, screenshots, videos on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
